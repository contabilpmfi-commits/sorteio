<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consórcio App</title>

<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</head>

<body>

<div class="app">

    <!-- HEADER -->
    <div class="header" id="header" style="display:none;">
        <img src="img/Logo.png">
        <div class="user">
            <span id="userEmail"></span>
            <button onclick="logout()">⏻</button>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="login" class="tela">
        <h2>Login</h2>
        <input id="email" placeholder="Email">
        <input id="senha" type="password" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="tela">
        <h2>Meus Consórcios</h2>

        <button onclick="abrirCadastro()">+ Novo</button>

        <div id="listaConsorcios"></div>
    </div>

    <!-- CADASTRO -->
    <div id="cadastro" class="tela">
        <h3>Novo Consórcio</h3>

        <input id="nome" placeholder="Nome">
        <input id="qtd" type="number" placeholder="Qtd">
        <input id="inicio" type="date">
        <input id="fim" type="date">

        <button onclick="gerarParticipantes()">Gerar participantes</button>

        <div id="participantes"></div>

        <button onclick="salvarConsorcio()">Salvar</button>
        <button onclick="voltar()">Voltar</button>
    </div>

    <!-- CONSÓRCIO -->
    <div id="consorcio" class="tela">

        <h2 id="titulo"></h2>

        <div class="linha">
            <button onclick="sortear()">🎲 Sortear</button>
            <button onclick="resetar()">🔄 Resetar</button>
        </div>

        <div id="tabela"></div>

        <div class="linha">
            <button onclick="gerarImagem()">📸 Extrato</button>
            <button onclick="excluir()">🗑️ Excluir</button>
        </div>

        <button onclick="voltar()">Voltar</button>

    </div>

</div>

<!-- AREA IMAGEM -->
<div id="areaImagem" class="extrato-img" style="display:none;">
    <img src="img/Logo.png" class="logo-img">
    <h2 id="tituloImagem"></h2>
    <div id="listaImagem"></div>
</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
