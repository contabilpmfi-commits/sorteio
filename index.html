<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Consórcio</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* CONTAINER */
.container {
    width: 100%;
    max-width: 400px;
    padding: 20px;
    text-align: center;
}

/* LOGO */
.logo {
    width: 150px;
    margin-bottom: 10px;
}

/* BOX */
.box {
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(45deg,#ff4d6d,#ff758f);
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* RESULTADO */
.resultado {
    font-size: 22px;
    margin-top: 15px;
    font-weight: bold;
}

/* HISTÓRICO */
#historico {
    max-height: 150px;
    overflow-y: auto;
    text-align: left;
    margin-top: 10px;
}

</style>
</head>

<body>

<div class="container">

<img src="img/Logo.png" class="logo">

<!-- LOGIN -->
<div id="login" class="box">
    <h2>Login</h2>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

    <div class="box">
        <h2>Consórcio</h2>

        <input id="nome" placeholder="Nome do consórcio">
        <input id="qtd" type="number" placeholder="Número de participantes">
        <input id="inicio" type="date">
        <input id="fim" type="date">

        <button onclick="gerar()">Gerar participantes</button>

        <div id="lista"></div>

        <button onclick="iniciar()">INICIAR SORTEIO</button>

        <div id="resultado"></div>
    </div>

    <div class="box">
        <h3>Histórico</h3>
        <div id="historico"></div>
    </div>

</div>

</div>

<script>

/* LOGIN */
function login(){
    if(user.value==="admin" && pass.value==="123"){
        localStorage.setItem("logado",true);
        mostrar();
    } else {
        alert("Login inválido");
    }
}

if(localStorage.getItem("logado")) mostrar();

function mostrar(){
    login.style.display="none";
    app.style.display="block";
}

/* GERAR PARTICIPANTES */
function gerar(){
    lista.innerHTML="";
    for(let i=0;i<qtd.value;i++){
        lista.innerHTML+=`<input class="p" placeholder="Nome ${i+1}" oninput="this.value=this.value.toUpperCase()">`;
    }
}

/* GERAR MESES */
function gerarMeses(i,f){
    let meses=[];
    let d=new Date(i);

    while(d<=new Date(f)){
        meses.push(d.toLocaleDateString('pt-BR',{month:'short',year:'numeric'}));
        d.setMonth(d.getMonth()+1);
    }
    return meses;
}

let pessoas=[], meses=[];

/* INICIAR */
function iniciar(){

    pessoas=[];
    document.querySelectorAll(".p").forEach(e=>pessoas.push(e.value));

    meses=gerarMeses(inicio.value,fim.value);

    if(pessoas.length!==meses.length){
        alert("Quantidade de pessoas e meses diferente!");
        return;
    }

    historico.innerHTML="";
    localStorage.setItem("historico","");

    sortear();
}

/* SORTEIO */
function sortear(){

    if(pessoas.length===0){
        alert("Fim do sorteio");
        return;
    }

    let i=Math.floor(Math.random()*pessoas.length);
    let m=Math.floor(Math.random()*meses.length);

    let p=pessoas.splice(i,1)[0];
    let mes=meses.splice(m,1)[0];

    resultado.innerHTML=`<div class="resultado">${p} → ${mes}</div>`;

    historico.innerHTML+=`<p>${p} → ${mes}</p>`;

    localStorage.setItem("historico",historico.innerHTML);

    confetti({
        particleCount: 120,
        spread: 70
    });

    new Audio("https://www.soundjay.com/button/sounds/button-3.mp3").play();
}

/* RESTAURAR HISTÓRICO */
historico.innerHTML = localStorage.getItem("historico") || "";

</script>

</body>
</html>
