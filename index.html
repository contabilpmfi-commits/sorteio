<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Consórcio</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 100%;
    max-width: 400px;
    padding: 20px;
    text-align: center;
}

.logo {
    width: 150px;
    margin-bottom: 10px;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(45deg,#ff4d6d,#ff758f);
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

.resultado {
    font-size: 22px;
    margin-top: 15px;
    font-weight: bold;
}

#historico {
    max-height: 150px;
    overflow-y: auto;
    text-align: left;
    margin-top: 10px;
}

</style>
</head>

<body>

<div class="container">

<img src="img/Logo.png" class="logo">

<!-- LOGIN -->
<div id="loginBox" class="box">
    <h2>Login</h2>
    <input id="user" placeholder="Email">
    <input id="pass" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

    <div class="box">
        <h2>Consórcio</h2>

        <input id="nome" placeholder="Nome do consórcio">
        <input id="qtd" type="number" placeholder="Número de participantes">
        <input id="inicio" type="date">
        <input id="fim" type="date">

        <button onclick="gerar()">Gerar participantes</button>

        <div id="lista"></div>

        <button onclick="iniciar()">INICIAR SORTEIO</button>

        <button onclick="logout()">Sair</button>

        <div id="resultado"></div>
    </div>

    <div class="box">
        <h3>Histórico</h3>
        <div id="historico"></div>
    </div>

</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* SUA CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBDxaSPwNAG9o5t2EmImCyr6qQb8rySGqY",
  authDomain: "consorcio-app-fbef2.firebaseapp.com",
  projectId: "consorcio-app-fbef2",
  storageBucket: "consorcio-app-fbef2.firebasestorage.app",
  messagingSenderId: "1029360209160",
  appId: "1:1029360209160:web:f3b93739c21659e0cdb0bd"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

/* LOGIN */
window.login = async function(){
    let email = document.getElementById("user").value;
    let senha = document.getElementById("pass").value;

    try {
        await signInWithEmailAndPassword(auth, email, senha);
    } catch {
        await createUserWithEmailAndPassword(auth, email, senha);
    }
}

/* ESTADO LOGIN */
onAuthStateChanged(auth, (usuario)=>{
    if(usuario){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";
        carregar();
    } else {
        document.getElementById("loginBox").style.display="block";
        document.getElementById("app").style.display="none";
    }
});

/* LOGOUT */
window.logout = function(){
    signOut(auth);
}

/* SALVAR */
async function salvar(nome, historico){
    await addDoc(collection(db, "sorteios"), {
        nome,
        historico,
        data: new Date()
    });
}

/* CARREGAR */
async function carregar(){
    let query = await getDocs(collection(db, "sorteios"));
    let h = document.getElementById("historico");
    h.innerHTML = "";

    query.forEach(doc=>{
        let d = doc.data();
        h.innerHTML += `<p><b>${d.nome}</b><br>${d.historico}</p><hr>`;
    });
}

/* LÓGICA DO SISTEMA */
window.gerar = function(){
    let qtd = document.getElementById("qtd").value;
    let lista = document.getElementById("lista");
    lista.innerHTML="";

    for(let i=0;i<qtd;i++){
        lista.innerHTML+=`<input class="p" placeholder="Nome ${i+1}" oninput="this.value=this.value.toUpperCase()">`;
    }
}

function gerarMeses(i,f){
    let meses=[];
    let d=new Date(i);

    while(d<=new Date(f)){
        meses.push(d.toLocaleDateString('pt-BR',{month:'short',year:'numeric'}));
        d.setMonth(d.getMonth()+1);
    }
    return meses;
}

let pessoas=[], meses=[];

window.iniciar = function(){

    pessoas=[];
    document.querySelectorAll(".p").forEach(e=>pessoas.push(e.value));

    let inicio = document.getElementById("inicio").value;
    let fim = document.getElementById("fim").value;

    meses=gerarMeses(inicio,fim);

    if(pessoas.length!==meses.length){
        alert("Quantidade de pessoas e meses diferente!");
        return;
    }

    document.getElementById("historico").innerHTML="";

    sortear();
}

function sortear(){

    if(pessoas.length===0){
        alert("Fim do sorteio");
        return;
    }

    let i=Math.floor(Math.random()*pessoas.length);
    let m=Math.floor(Math.random()*meses.length);

    let p=pessoas.splice(i,1)[0];
    let mes=meses.splice(m,1)[0];

    document.getElementById("resultado").innerHTML =
        `<div class="resultado">${p} → ${mes}</div>`;

    let hist = document.getElementById("historico");
    hist.innerHTML+=`<p>${p} → ${mes}</p>`;

    salvar(document.getElementById("nome").value, hist.innerHTML);

    confetti({particleCount:120,spread:70});
    new Audio("https://www.soundjay.com/button/sounds/button-3.mp3").play();
}

</script>

</body>
</html>
