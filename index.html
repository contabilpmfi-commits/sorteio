<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consórcio App</title>

<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>
<body>

<!-- LOGIN -->
<div id="login" class="tela ativa">
    <div class="card login-card">
        <img src="img/Logo.png" class="logo">
        <h2>Login</h2>
        <input id="email" placeholder="Email">
        <input id="senha" type="password" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tela">

    <div class="topo">
        <img src="img/Logo.png" class="logo">
        <h2>Meus Consórcios</h2>
    </div>

    <button class="btn-principal" onclick="abrirCadastro()">+ Novo Consórcio</button>

    <div id="listaConsorcios"></div>

    <button class="btn-secundario" onclick="logout()">Sair</button>
</div>

<!-- CADASTRO -->
<div id="cadastro" class="tela">

    <div class="topo">
        <h3>Novo Consórcio</h3>
    </div>

    <input id="nome" placeholder="Nome do consórcio">
    <input id="qtd" type="number" placeholder="Número de participantes">
    <input id="inicio" type="date">
    <input id="fim" type="date">

    <label class="check">
        <input type="checkbox" id="manual"> Já foi sorteado
    </label>

    <button onclick="gerarParticipantes()">Gerar participantes</button>

    <div id="participantes"></div>

    <button class="btn-principal" onclick="salvarConsorcio()">Salvar</button>
    <button class="btn-secundario" onclick="voltar()">Voltar</button>

</div>

<!-- SORTEIO -->
<div id="sorteio" class="tela sorteio">

    <h2 id="titulo"></h2>

    <div class="nome" id="nomeSorteado"></div>
    <div class="mes" id="mesSorteado"></div>

    <button class="btn-principal" onclick="sortear()">Sortear</button>
    <button onclick="exportarTexto()">Exportar</button>
    <button class="btn-secundario" onclick="voltar()">Voltar</button>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
