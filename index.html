<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consórcio App</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
.card {
    background:white;
    padding:15px;
    border-radius:10px;
    margin:10px 0;
    text-align:left;
}

.card button {
    width:auto;
    margin:5px 5px 0 0;
    padding:6px 10px;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="login" class="tela ativa">
    <div class="card">
        <h2>Login</h2>
        <input id="email" placeholder="Email">
        <input id="senha" type="password" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tela">
    <div class="topo">
    <img src="img/Logo.png" class="logo">
    <h2>Consórcios</h2>
</div>
<!-- CADASTRO -->
<div id="cadastro" class="tela">

    <h3>Novo Consórcio</h3>

    <input id="nome" placeholder="Nome">
    <input id="qtd" type="number" placeholder="Participantes">
    <input id="inicio" type="date">
    <input id="fim" type="date">

    <label>
        <input type="checkbox" id="manual"> Já foi sorteado
    </label>

    <button onclick="gerarParticipantes()">Gerar nomes</button>

    <div id="participantes"></div>

    <button onclick="salvarConsorcio()">Salvar</button>
    <button onclick="voltar()">Voltar</button>

</div>

<!-- SORTEIO -->
<div id="sorteio" class="tela">

    <h2 id="titulo"></h2>

    <div id="nomeSorteado" style="font-size:30px;"></div>
    <div id="mesSorteado"></div>

    <button onclick="sortear()">Sortear</button>
    <button onclick="exportarTexto()">Exportar</button>
    <button onclick="voltar()">Voltar</button>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
