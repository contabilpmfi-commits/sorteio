<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consórcio</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>

<body>

<div class="container">

<img src="img/Logo.png" class="logo">

<div id="loginBox" class="box">
<h3>Login</h3>
<input id="user" placeholder="Email">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">

<div class="box">
<input id="nome" placeholder="Nome do consórcio">
<input id="qtd" type="number" placeholder="Número de participantes">
<input id="inicio" type="date">
<input id="fim" type="date">

<button onclick="gerar()">Gerar participantes</button>

<div id="lista"></div>

<button onclick="preparar()">Iniciar ciclo</button>
<button onclick="sortear()">Sortear próximo</button>

<button onclick="gerarImagem()">📸 Imagem</button>
<button onclick="enviarWhats()">📲 WhatsApp</button>

<button onclick="logout()">Sair</button>
</div>

<div id="areaPrint" class="box">
<h3 id="tituloPrint"></h3>
<div id="historico"></div>
</div>

</div>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
