<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Consórcio</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align: center;
}

.container {
    max-width: 400px;
    margin: auto;
    padding: 20px;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 15px;
    margin-top: 15px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
}

button {
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 20px;
    background: #ff4d6d;
    color: white;
    margin-top: 10px;
    cursor: pointer;
}

.resultado {
    font-size: 22px;
    margin-top: 15px;
}

img {
    width: 150px;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGO -->
<img src="img/Logo.png">

<!-- LOGIN -->
<div id="login" class="box">
    <h2>Login</h2>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
</div>

<!-- SISTEMA -->
<div id="app" style="display:none;">

    <h2 id="titulo"></h2>

    <div class="box">
        <input id="nome" placeholder="Nome do consórcio">
        <input id="qtd" type="number" placeholder="Número de participantes">
        <input id="inicio" type="date">
        <input id="fim" type="date">

        <button onclick="gerar()">Gerar participantes</button>

        <div id="lista"></div>

        <button onclick="iniciar()">INICIAR SORTEIO</button>
    </div>

    <div id="resultado"></div>

    <div class="box">
        <h3>Histórico</h3>
        <div id="historico"></div>
    </div>

</div>

</div>

<script>

/* LOGIN */
function login(){
    if(user.value==="admin" && pass.value==="123"){
        localStorage.setItem("logado",true);
        mostrar();
    } else alert("Login inválido");
}

if(localStorage.getItem("logado")) mostrar();

function mostrar(){
    login.style.display="none";
    app.style.display="block";
}

/* GERAR PARTICIPANTES */
function gerar(){
    lista.innerHTML="";
    for(let i=0;i<qtd.value;i++){
        lista.innerHTML+=`<input class="p" oninput="this.value=this.value.toUpperCase()" placeholder="Nome ${i+1}">`;
    }
}

/* GERAR MESES */
function gerarMeses(i,f){
    let meses=[];
    let d=new Date(i);
    while(d<=new Date(f)){
        meses.push(d.toLocaleDateString('pt-BR',{month:'short',year:'numeric'}));
        d.setMonth(d.getMonth()+1);
    }
    return meses;
}

let pessoas=[], meses=[];

/* INICIAR */
function iniciar(){

    pessoas=[];
    document.querySelectorAll(".p").forEach(e=>pessoas.push(e.value));

    meses=gerarMeses(inicio.value,fim.value);

    if(pessoas.length!==meses.length){
        alert("Quantidade diferente!");
        return;
    }

    localStorage.setItem("historico","");
    historico.innerHTML="";

    sortear();
}

/* SORTEIO */
function sortear(){

    if(pessoas.length===0){
        alert("Fim do sorteio");
        return;
    }

    let i=Math.floor(Math.random()*pessoas.length);
    let m=Math.floor(Math.random()*meses.length);

    let p=pessoas.splice(i,1)[0];
    let mes=meses.splice(m,1)[0];

    resultado.innerHTML=`<div class="resultado">${p} → ${mes}</div>`;

    historico.innerHTML+=`<p>${p} → ${mes}</p>`;

    localStorage.setItem("historico",historico.innerHTML);

    /* efeitos */
    confetti();
    new Audio("https://www.soundjay.com/button/sounds/button-3.mp3").play();
}

/* RESTAURAR */
historico.innerHTML=localStorage.getItem("historico")||"";

</script>

</body>
</html>
