<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consórcio App</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</head>

<body>

<div class="card">

<img src="img/Logo.png" class="logo">

<!-- LOGIN -->
<div id="login">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
    <h2>Consórcios</h2>

    <button onclick="abrirCadastro()">+ Novo</button>

    <div id="listaConsorcios"></div>

    <button onclick="logout()">Sair</button>
</div>

<!-- CADASTRO -->
<div id="cadastro" class="hidden">

    <h3>Novo Consórcio</h3>

    <input id="nome" placeholder="Nome do consórcio">
    <input id="qtd" type="number" placeholder="Quantidade">
    <input id="inicio" type="date">
    <input id="fim" type="date">

    <button onclick="gerarParticipantes()">Gerar participantes</button>

    <div id="participantes"></div>

    <button onclick="salvarConsorcio()">Salvar</button>
    <button onclick="voltar()">Voltar</button>

</div>

<!-- SORTEIO -->
<div id="sorteio" class="hidden">

    <h2 id="titulo"></h2>

    <label>Participante</label>
    <select id="manualPessoa"></select>

    <label>Mês</label>
    <select id="manualMes"></select>

    <button onclick="sortear()">🎲 Sortear automático</button>
    <button onclick="sortearManual()">✍️ Inserir manual</button>

    <h3>Histórico</h3>

    <div id="historico" class="extrato"></div>

    <button onclick="gerarImagem()">📸 Gerar extrato</button>

    <button onclick="voltar()">Voltar</button>

</div>

<!-- AREA PARA GERAR IMAGEM -->
<div id="areaImagem" class="hidden extrato-img">

    <img src="img/Logo.png" class="logo-img">

    <h2>Resultado do Sorteio</h2>

    <h3 id="tituloImagem"></h3>

    <div id="listaImagem"></div>

    <p class="rodape">Gerado automaticamente</p>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
