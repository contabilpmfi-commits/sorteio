<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consórcio App</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>
<body>

<!-- LOGIN -->
<div id="login" class="tela ativa">
    <div class="card">
        <h2>Login</h2>
        <input id="email" placeholder="Email">
        <input id="senha" type="password" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tela">
    <h2>Meus Consórcios</h2>

    <button onclick="abrirCadastro()">+ Novo</button>

    <div id="listaConsorcios"></div>

    <button onclick="logout()">Sair</button>
</div>

<!-- CADASTRO -->
<div id="cadastro" class="tela">
    <h3>Novo Consórcio</h3>

    <input id="nome" placeholder="Nome">
    <input id="qtd" type="number" placeholder="Participantes">
    <input id="inicio" type="date">
    <input id="fim" type="date">

    <button onclick="gerarParticipantes()">Gerar nomes</button>

    <div id="participantes"></div>

    <button onclick="salvarConsorcio()">Salvar</button>
    <button onclick="voltar()">Voltar</button>
</div>

<!-- SORTEIO -->
<div id="sorteio" class="tela sorteio">

    <h2 id="titulo"></h2>

    <div class="nome" id="nomeSorteado"></div>
    <div class="mes" id="mesSorteado"></div>

    <button onclick="sortear()">Sortear</button>
    <button onclick="voltar()">Voltar</button>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
