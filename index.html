<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consórcio</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
.container { max-width:400px;width:100%;padding:20px;text-align:center;}
.logo { width:150px;margin-bottom:10px;}

.box {
    background:white;
    padding:20px;
    border-radius:15px;
    margin-top:10px;
}

input {
    width:100%;
    padding:10px;
    margin:5px 0;
    box-sizing:border-box;
}

button {
    width:100%;
    padding:10px;
    border:none;
    border-radius:20px;
    background:#ff4d6d;
    color:white;
    margin-top:10px;
    cursor:pointer;
}

#areaPrint {
    background:white;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}

.resultado { font-weight:bold;margin-top:10px; }

</style>
</head>

<body>

<div class="container">

<img src="img/Logo.png" class="logo">

<div id="loginBox" class="box">
<h2>Login</h2>
<input id="user" placeholder="Email">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">

<div class="box">

<input id="nome" placeholder="Nome do consórcio">
<input id="qtd" type="number" placeholder="Número de participantes">
<input id="inicio" type="date">
<input id="fim" type="date">

<button onclick="gerar()">Gerar participantes</button>
<div id="lista"></div>

<button onclick="preparar()">INICIAR CICLO</button>
<button onclick="sortear()">SORTEAR PRÓXIMO</button>

<button onclick="gerarImagem()">📸 Gerar imagem</button>
<button onclick="enviarWhats()">📲 Enviar WhatsApp</button>

<button onclick="logout()">Sair</button>

</div>

<div id="areaPrint">
<h3 id="tituloPrint"></h3>
<div id="historico"></div>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "consorcio-app-fbef2.firebaseapp.com",
  projectId: "consorcio-app-fbef2"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

/* LOGIN */
window.login = async ()=>{
    try{
        await signInWithEmailAndPassword(auth,user.value,pass.value);
    }catch{
        await createUserWithEmailAndPassword(auth,user.value,pass.value);
    }
}

onAuthStateChanged(auth,(u)=>{
    if(u){
        loginBox.style.display="none";
        app.style.display="block";
    } else {
        loginBox.style.display="block";
        app.style.display="none";
    }
});

window.logout = ()=> signOut(auth);

/* PARTICIPANTES */
window.gerar = ()=>{
    lista.innerHTML="";
    for(let i=0;i<qtd.value;i++){
        lista.innerHTML+=`<input class="p" placeholder="Nome ${i+1}" oninput="this.value=this.value.toUpperCase()">`;
    }
}

function gerarMeses(i,f){
    let meses=[];
    let d=new Date(i);
    while(d<=new Date(f)){
        meses.push(d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}));
        d.setMonth(d.getMonth()+1);
    }
    return meses;
}

let pessoas=[], meses=[], usados=[];

/* PREPARAR */
window.preparar = ()=>{
    pessoas=[...document.querySelectorAll(".p")].map(e=>e.value);
    meses=gerarMeses(inicio.value,fim.value);
    usados=[];
    historico.innerHTML="";
    tituloPrint.innerText=nome.value;
}

/* SORTEAR */
window.sortear = async ()=>{

    if(usados.length===pessoas.length){
        alert("Todos já foram sorteados!");
        return;
    }

    let disponiveis=pessoas.filter(p=>!usados.includes(p));
    let sorteado=disponiveis[Math.floor(Math.random()*disponiveis.length)];

    let mes=meses[usados.length];

    usados.push(sorteado);

    historico.innerHTML+=`<p>${mes} → ${sorteado}</p>`;

    confetti({particleCount:120,spread:70});

    await addDoc(collection(db,"sorteios"),{
        nome:nome.value,
        pessoa:sorteado,
        mes:mes,
        uid:auth.currentUser.uid
    });
}

/* GERAR IMAGEM */
window.gerarImagem = async ()=>{
    let canvas = await html2canvas(document.getElementById("areaPrint"));
    let link = document.createElement("a");
    link.download = "sorteio.png";
    link.href = canvas.toDataURL();
    link.click();
}

/* WHATSAPP */
window.enviarWhats = ()=>{
    let texto = historico.innerText;
    let url = "https://wa.me/?text=" + encodeURIComponent(texto);
    window.open(url);
}

</script>

</body>
</html>
